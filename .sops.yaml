# SOPS encryption configuration.
# Tells SOPS which public key to use when encrypting talsecret.sops.yaml.
#
# Setup (one time):
#   1. Install age:       brew install age   (or your distro's package manager)
#   2. Generate key pair: age-keygen -o age.key
#      → stdout prints:   "Public key: age1..."
#   3. Replace the placeholder below with that public key.
#   4. Move the private key to the default SOPS location so talhelper can decrypt:
#        mkdir -p ~/.config/sops/age
#        mv age.key ~/.config/sops/age/keys.txt
#   5. Commit .sops.yaml — the public key is safe to store in git.
#      The private key (~/.config/sops/age/keys.txt) never leaves your machine.

creation_rules:
  - path_regex: talsecret\.sops\.yaml$
    age: >-
      age1REPLACE_WITH_YOUR_PUBLIC_KEY
